<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Pancrea-Score — Острый Панкреатит</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0c1422;--bg3:#111e2e;--bd:#1a2d44;--bd2:#2a4060;
  --t:#ddeeff;--t2:#7090b0;--t3:#304560;
  --c:#00dfc0;--g:#10c98a;--y:#f5a623;--r:#ef4343;--b:#4a9eff;
}
html,body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99}
.logo{width:34px;height:34px;background:var(--c);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-t{font-size:14px;font-weight:700;color:var(--c)}
.logo-s{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.dbadge{margin-left:auto;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap}
.ok{background:#10c98a18;border-color:#10c98a55;color:var(--g)}
.warn{background:#f5a62318;border-color:#f5a62355;color:var(--y)}
.snav{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;padding:0 8px}
.snav::-webkit-scrollbar{display:none}
.sb{padding:9px 10px;border:none;background:transparent;color:var(--t3);font-size:12px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit;transition:.15s}
.sb.active{color:var(--c);border-bottom-color:var(--c);font-weight:600}
.sb.done{color:var(--g)}
.sb.locked{opacity:.3;cursor:not-allowed}
.snum{width:17px;height:17px;border-radius:50%;background:var(--bd);color:var(--t3);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb.active .snum{background:var(--c);color:#000}
.sb.done .snum{background:var(--g);color:#000}
.wrap{padding:14px;max-width:700px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px}
.ch{background:var(--bg3);border-bottom:1px solid var(--bd);padding:9px 13px;display:flex;align-items:center;gap:7px}
.ct{font-size:11px;font-weight:700;color:#8aaccc;text-transform:uppercase;letter-spacing:.05em}
.cb{padding:13px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:11px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.fl{display:flex;flex-direction:column;gap:4px}
.flb{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.fw{display:flex}
/* NUMBER INPUTS — no oninput rerender, just save state */
.fi{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--t);font-size:14px;padding:7px 9px;outline:none;font-family:'Courier New',monospace;width:100%;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi.u{border-radius:7px 0 0 7px}
.fi:focus{border-color:var(--c);box-shadow:0 0 0 2px #00dfc020}
.fi::placeholder{color:var(--t3)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:.4}
.fu{background:var(--bg3);border:1px solid var(--bd);border-left:none;border-radius:0 7px 7px 0;padding:7px 8px;font-size:11px;color:var(--t3);white-space:nowrap;display:flex;align-items:center}
.fsel{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--t);font-size:13px;padding:7px 9px;outline:none;font-family:inherit;cursor:pointer;transition:border-color .2s}
.fsel:focus{border-color:var(--c)}
.fconv{font-size:10px;color:var(--c);margin-top:3px;line-height:1.5;min-height:16px}
.crit{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);cursor:pointer;transition:.15s;user-select:none;margin-bottom:9px}
.crit:hover{border-color:var(--bd2)}
.crit.on{background:#10c98a0a;border-color:#10c98a44}
.cbox{width:22px;height:22px;border-radius:5px;border:2px solid var(--bd2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px}
.crit.on .cbox{background:var(--g);border-color:var(--g)}
.ctit{font-size:14px;font-weight:600;color:var(--t)}
.cdesc{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.5}
.cinp{margin-top:9px}
.ccnt{display:flex;justify-content:center;gap:8px;margin-bottom:13px}
.cdot{width:34px;height:34px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t3);transition:.3s}
.cdot.m{border-color:var(--g);background:#10c98a20;color:var(--g)}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.eb{padding:8px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--t2);font-size:12px;cursor:pointer;text-align:left;transition:.15s;font-family:inherit}
.eb:hover{border-color:var(--bd2);color:var(--t)}
.eb.on{background:#00dfc010;border-color:#00dfc066;color:var(--c);font-weight:600}
.esub{font-size:10px;color:var(--t3);margin-top:2px}
.eb.on .esub{color:#00dfc080}
.tg{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tb{padding:7px 13px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s}
.tb:hover{border-color:var(--bd2);color:var(--t)}
.tb.on{background:#00dfc012;border-color:#00dfc066;color:var(--c);font-weight:600}
.tb.ong{background:#10c98a18;border-color:#10c98a55;color:var(--g);font-weight:600}
.tb.onr{background:#ef434318;border-color:#ef434355;color:var(--r);font-weight:600}
.btnrow{display:flex;gap:9px;margin-top:18px;padding-bottom:28px}
.btn{padding:12px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;flex:1}
.btn-p{background:var(--c);color:#000}
.btn-p:hover{background:#00c8aa}
.btn-p:disabled{background:var(--bd);color:var(--t3);cursor:not-allowed}
.btn-s{background:var(--bg3);color:var(--t2);border:1px solid var(--bd);flex:0 0 auto;padding:12px 14px}
.btn-s:hover{border-color:var(--bd2);color:var(--t)}
.ib{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:11px;color:var(--t2);line-height:1.6;margin-top:9px}
.al{padding:9px 13px;border-radius:7px;font-size:12px;line-height:1.6;margin-bottom:11px;border:1px solid}
.al-i{background:#4a9eff18;border-color:#4a9eff44;color:#7ac0ff}
.al-w{background:#f5a62318;border-color:#f5a62355;color:#f5c060}
.al-g{background:#10c98a18;border-color:#10c98a44;color:var(--g)}
.al-r{background:#ef434318;border-color:#ef434355;color:var(--r)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.sc{background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.sch{padding:10px 13px;border-bottom:1px solid;display:flex;justify-content:space-between;align-items:center}
.scn{font-size:13px;font-weight:700;color:var(--t)}
.scfn{font-size:10px;color:var(--t3);margin-top:1px}
.scv{font-size:26px;font-weight:700;font-family:'Courier New',monospace}
.scb{padding:11px 13px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1a2d4422;font-size:12px}
.sr:last-child{border-bottom:none}
.srl{color:var(--t2)}
.srv{font-family:'Courier New',monospace;font-weight:700;color:var(--t)}
.svrd{margin-top:9px;padding:8px 11px;border-radius:7px;border:1px solid}
.svt{font-size:13px;font-weight:700}
.svs{font-size:11px;color:var(--t2);margin-top:2px}
.tpt{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.tpb{padding:5px 16px;border-radius:20px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-size:13px;cursor:pointer;font-family:'Courier New',monospace;font-weight:700;transition:.15s}
.tpb.on{background:#00dfc018;border-color:#00dfc066;color:var(--c)}
.ctbl{width:100%;border-collapse:collapse;font-size:13px}
.ctbl th{padding:7px 8px;background:var(--bg3);color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd);text-align:left}
.ctbl td{padding:8px;border-bottom:1px solid #1a2d4422}
.ctbl tr:hover td{background:var(--bg3)}
.tpv{font-family:'Courier New',monospace;font-weight:700;font-size:16px}
.tu{color:var(--r)}.td{color:var(--g)}.tf{color:var(--y)}
.ri{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;border-left:3px solid;transition:background .1s;user-select:none}
.ri:hover{background:var(--bg3)}
.ri.dn{opacity:.5}
.ri.dn .rit{text-decoration:line-through}
.ric{width:19px;height:19px;border-radius:4px;border:2px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.ri.dn .ric{background:var(--g);border-color:var(--g)}
.rit{font-size:13px;color:var(--t);flex:1;line-height:1.4}
.rip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ds{display:flex;gap:11px;padding:13px;border-radius:8px;margin-bottom:9px;border:1px solid}
.di{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.dl{font-size:14px;font-weight:700;margin-bottom:4px}
.dd{font-size:12px;color:var(--t2);line-height:1.6}
.ub{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;background:#ef434322;color:var(--r);border:1px solid #ef434355;margin-left:7px;animation:bk 1.5s infinite}
.sl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
/* SURGICAL CALC */
.surg-sel{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;color:var(--t);font-size:14px;padding:10px 12px;outline:none;font-family:inherit;cursor:pointer;transition:border-color .2s;margin-top:5px}
.surg-sel:focus{border-color:var(--c);box-shadow:0 0 0 2px #00dfc020}
.surg-item{margin-bottom:14px}
.surg-lbl{font-size:13px;font-weight:600;color:var(--t);margin-bottom:4px}
.surg-sub{font-size:11px;color:var(--t3);margin-bottom:3px}
.score-big{text-align:center;padding:18px;border-radius:10px;border:1px solid;margin-top:14px}
.score-num{font-size:52px;font-weight:700;font-family:'Courier New',monospace}
.score-lbl{font-size:14px;font-weight:700;margin-top:6px}
.score-rec{font-size:13px;margin-top:8px;line-height:1.6;color:var(--t2)}
.fi-anim{animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:480px){
  .fg{grid-template-columns:1fr 1fr}
  .fg3{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:1fr}
  .egrid{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@media print{
  body{background:#fff!important;color:#000!important}
  .hdr,.snav,.btnrow{display:none!important}
  .card{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}
  .ch{background:#f5f5f5!important}
  .ct,.scn,.flb,.sl,.srl{color:#444!important}
  .srv,.scv,.tpv{color:#000!important}
  .al{border:1px solid #ccc!important;background:#f9f9f9!important;color:#333!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo" onclick="goHome()" style="cursor:pointer">🔬</div>
  <div>
    <div class="logo-t">Pancrea-Score</div>
    <div class="logo-s">Острый Панкреатит · Оценка тяжести</div>
  </div>
  <button id="homebtn" onclick="goHome()" style="margin-left:auto;background:var(--bg3);border:1px solid var(--bd2);color:var(--t2);padding:5px 11px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap">👥 Пациенты</button>
  <div id="dbadge" class="dbadge warn" style="margin-left:8px">⚠ 0/3</div>
</div>
<div class="snav" id="snav"></div>
<div class="wrap" id="main"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// PANCREA-SCORE  ·  Система управления пациентами
// ═══════════════════════════════════════════════════════════════
var VIEW = 'home'; // 'home' | 'patient'

// ── БАЗА ДАННЫХ (localStorage) ─────────────────────────────────
var DB = {
  KEY: 'pancrea_v3',
  load: function(){
    try{ return JSON.parse(localStorage.getItem(this.KEY)||'[]'); }
    catch(e){ return []; }
  },
  saveAll: function(list){
    try{ localStorage.setItem(this.KEY, JSON.stringify(list)); }catch(e){}
  },
  saveCurrent: function(){
    if(VIEW!=='patient') return;
    var list = DB.load();
    var now  = Date.now();
    var rec  = JSON.parse(JSON.stringify(ST));
    if(!rec.id){ rec.id = 'p'+now; ST.id = rec.id; }
    rec.savedAt   = rec.savedAt || now;
    rec.updatedAt = now;
    var idx = list.findIndex(function(x){ return x.id===rec.id; });
    if(idx>=0) list[idx]=rec; else list.unshift(rec);
    DB.saveAll(list);
  },
  del: function(id){
    DB.saveAll(DB.load().filter(function(p){ return p.id!==id; }));
  },
  get: function(id){
    return DB.load().find(function(p){ return p.id===id; })||null;
  }
};

// ── ЭКСПОРТ / ИМПОРТ ────────────────────────────────────────────
function exportLink(id){
  var p = id ? DB.get(id) : JSON.parse(JSON.stringify(ST));
  if(!p) return;
  try{
    var b64 = btoa(unescape(encodeURIComponent(JSON.stringify(p))));
    // encodeURIComponent чтобы +/=/  не обрезались браузером/мессенджером
    var url = location.href.split('#')[0]+'#ps='+encodeURIComponent(b64);
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){
        alert('✅ Ссылка скопирована в буфер обмена!\n\nОтправьте её коллеге в мессенджере или по email.\nПри открытии данные пациента загрузятся автоматически.');
      },function(){
        prompt('Скопируйте ссылку (Ctrl+A → Ctrl+C):', url);
      });
    } else {
      prompt('Скопируйте ссылку (Ctrl+A → Ctrl+C):', url);
    }
  }catch(e){ alert('Ошибка создания ссылки'); }
}
function exportFile(id){
  var p = id ? DB.get(id) : JSON.parse(JSON.stringify(ST));
  if(!p) return;
  var name = ((p.pat&&p.pat.initials?p.pat.initials.replace(/\s+/g,'_'):'patient')
    +'_'+new Date(p.updatedAt||Date.now()).toISOString().slice(0,10));
  var a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(p,null,2));
  a.download = name+'.json'; a.click();
}
function exportAllFile(){
  var list = DB.load();
  if(!list.length){ alert('Нет пациентов'); return; }
  var a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(list,null,2));
  a.download = 'pancrea_all_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importFile(){
  var inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = function(){
    var f=inp.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(e){
      try{
        var data = JSON.parse(e.target.result);
        var recs = Array.isArray(data)?data:[data];
        var list = DB.load(); var added=0;
        recs.forEach(function(rec){
          if(!rec||!rec.diag) return;
          rec.id = 'p'+Date.now()+Math.floor(Math.random()*10000);
          rec.savedAt = rec.updatedAt = Date.now();
          list.unshift(rec); added++;
        });
        DB.saveAll(list);
        alert('✅ Загружено: '+added+' пациент(ов)');
        renderHome();
      }catch(err){ alert('⚠ Ошибка файла.\n\nУбедитесь, что это файл .json, ранее сохранённый из Pancrea-Score.\n\nДетали: '+err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function importLink(){
  var hash = location.hash;
  if(!hash||hash.indexOf('#ps=')<0) return false;
  try{
    // decodeURIComponent для обратной обработки encodeURIComponent в exportLink
    var b64 = decodeURIComponent(hash.replace('#ps=',''));
    var rec = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!rec||!rec.diag) return false;
    rec.id = 'p'+Date.now(); rec.savedAt=rec.updatedAt=Date.now();
    var list=DB.load(); list.unshift(rec); DB.saveAll(list);
    openPatient(rec.id); location.hash=''; return true;
  }catch(e){ return false; }
}

// ── НАВИГАЦИЯ ────────────────────────────────────────────────────
function goHome(){
  DB.saveCurrent();
  VIEW='home';
  renderFull();
}
function openPatient(id){
  var rec = DB.get(id);
  if(!rec) return;
  ST = JSON.parse(JSON.stringify(rec));
  if(typeof ST.step!=='number') ST.step=0;
  VIEW='patient';
  renderFull();
  window.scrollTo(0,0);
}
function renderFull(){
  var hb = document.getElementById('homebtn');
  var badge = document.getElementById('dbadge');
  var nav = document.getElementById('snav');
  var isP = VIEW==='patient';
  if(hb) hb.style.display = isP?'':'none';
  if(badge) badge.style.display = isP?'':'none';
  if(nav) nav.style.display = isP?'':'none';
  if(VIEW==='home') renderHome();
  else R();
}

// ── ДОМ: СПИСОК ПАЦИЕНТОВ ────────────────────────────────────────
function renderHome(){
  document.getElementById('main').innerHTML = buildHome();
}

function patAbbr(initials){
  if(!initials) return '?';
  var parts=initials.trim().split(/\s+/);
  if(parts.length>=3) return ((parts[0][0]||'')+(parts[1][0]||'')+(parts[2][0]||'')).toUpperCase();
  if(parts.length===2) return (parts[0].substring(0,2)+(parts[1][0]||'')).toUpperCase();
  return initials.substring(0,3).toUpperCase();
}

function patScores(p){
  // Возвращает {tp: {sc, ran, dzh, sev}} для каждого заполненного таймпоинта
  var origST=ST, out={};
  ST=p;
  ['24h','48h','72h'].forEach(function(tp){
    var d=p.data&&p.data[tp];
    if(!d||d.temp===undefined) return;
    out[tp]={sc:calc(tp), ran:calcRanson(), dzh:calcDzhanelidge(tp)};
    var sc=out[tp].sc,ran=out[tp].ran;
    out[tp].sev = sc.apache>=8||sc.bisap>=3||sc.sofa>=6||ran.score>=3 ? 'r'
                : sc.apache>=5||sc.bisap>=2||sc.sofa>=3||ran.score>=2 ? 'y' : 'g';
  });
  ST=origST;
  return out;
}

function buildHome(){
  var list = DB.load();
  var origST=ST;

  // Статистика
  var total=list.length, heavy=0, mid=0, light=0;
  list.forEach(function(p){
    var sc=patScores(p);
    var tps=['72h','48h','24h'];
    for(var i=0;i<tps.length;i++){
      if(sc[tps[i]]){
        var sev=sc[tps[i]].sev;
        if(sev==='r')heavy++;else if(sev==='y')mid++;else light++;
        break;
      }
    }
  });
  ST=origST;

  var etioMap={biliary:'ЖКБ',aliment:'Алимент.',hypertg:'Гипертриг.',
    ercp:'ЭРХПГ',drug:'Медикам.',trauma:'Травма',autoimmune:'Аутоимм.',idio:'Идиопат.'};

  // ── Строки таблицы пациентов
  var rows = list.map(function(p){
    var p2=p.pat||{};
    var abbr=patAbbr(p2.initials);
    var sc=patScores(p);
    var lastSev='g', lastSevL='Лёгкий';
    ['72h','48h','24h'].forEach(function(tp){

  (total===0 ?
    '<div style="text-align:center;padding:60px 20px;color:var(--t3)">'+
      '<div style="font-size:52px;margin-bottom:16px">🏥</div>'+

      '<div style="font-size:13px;margin-bottom:24px">Нажмите кнопку ниже, чтобы начать</div>'+
      '<button onclick="startNew()" '+

        '+ Новый пациент</button>'+
    '</div>'
  :
    '<div style="overflow-x:auto;margin-bottom:18px">'+
      '<table style="width:100%;border-collapse:collapse;min-width:560px">'+
        '<thead><tr style="background:var(--bg2)">'+

          '<th style="padding:8px;font-size:10px;color:var(--t2);text-transform:uppercase;border:1px solid var(--bd)">Возр/Пол</th>'+

          '<th style="padding:8px;border:1px solid var(--bd)"></th>'+

  )+

  '<div style="text-align:center;font-size:11px;color:var(--t3);padding:12px 0">'+

}

var DDEF={
  temp:'',hr:'',rr:'',sbp:'',dbp:'',uo:'',gcs:'15',men:'normal',vaso:'none',
  sirs_type:'none',
  urea:'',na:'',k:'',creat:'',bili:'',wbc:'',hct:'',plt:'',alb:'',tp:'',crp:'',
  gluc:'',hb:'',ldh:'',ast:'',ca:'',basedef:'',fluidseq:'',
  ph:'',pao2:'',fio2:'0.21',
  ctg:'0',nec:'none',ext:'no',ple:'no',arf:'no',
  dzh_peritoneal:'no',dzh_enceph:'no',dzh_ecg:'no',dzh_exudate:'no',
  dzh_parapanc:'no',dzh_steatonec:'no',dzh_nofluid:'no'
};

function D(tp){ if(!ST.data[tp]||ST.data[tp].temp===undefined){ST.data[tp]=JSON.parse(JSON.stringify(DDEF));} return ST.data[tp]; }

// Парсинг числа — заменяем запятую на точку
function pf(v){ if(v===null||v===undefined||v==='')return null; var n=parseFloat(String(v).replace(',','.')); return isNaN(n)?null:n; }

// Сохранить поле данных — НЕ вызывает R() (чтобы не терять фокус)
function sD(tp,k,v){ D(tp)[k]=String(v).replace(',','.'); }
// Сохранить и перерисовать (для select) + автосохранение
function sDR(tp,k,v){ D(tp)[k]=v; DB.saveCurrent(); R(); }
// Пациент
function sP(k,v){ ST.pat[k]=v; }
function sPR(k,v){ ST.pat[k]=v; DB.saveCurrent(); R(); }
// После потери фокуса — полная перерисовка + автосохранение
function onBlur(){ DB.saveCurrent(); R(); }

// КОНВЕРТАЦИИ (единицы СИ)
// ═══════════════════════════════════════════════
function urea2bun(v){ return v*2.8; }       // ммоль/л → мг/дл
function cr2mgdl(v){ return v/88.4; }       // мкмоль/л → мг/дл
function bi2mgdl(v){ return v/17.1; }       // мкмоль/л → мг/дл
// Na, K ммоль/л = mEq/L напрямую

// ═══════════════════════════════════════════════
// РАСЧЁТ ШКАЛ
// ═══════════════════════════════════════════════
function calc(tp){
  var d=D(tp), age=pf(ST.pat.age)||0;
  var temp=pf(d.temp),hr=pf(d.hr),rr=pf(d.rr);
  var sbp=pf(d.sbp),dbp=pf(d.dbp);
  var map=(sbp&&dbp)?((sbp+2*dbp)/3|0):null;
  var ph=pf(d.ph),pao2=pf(d.pao2),fio2=pf(d.fio2)||0.21;
  var na=pf(d.na),k=pf(d.k);
  var urea=pf(d.urea), bun=urea?urea2bun(urea):null;
  var creat=pf(d.creat), cr=creat?cr2mgdl(creat):null;
  var bili=pf(d.bili), bi=bili?bi2mgdl(bili):null;
  var hct=pf(d.hct),wbc=pf(d.wbc),plt=pf(d.plt);
  var gcs=pf(d.gcs)||15;
  var alb=pf(d.alb),tp2=pf(d.tp),crp=pf(d.crp);
  var uo=pf(d.uo);

  // ── APACHE II APS ──────────────────────────
  var aps=0;
  if(temp!==null){
    if(temp>=41)aps+=4;else if(temp>=39)aps+=3;else if(temp>=38.5)aps+=1;
    else if(temp<36&&temp>=34)aps+=1;else if(temp<34&&temp>=32)aps+=2;
    else if(temp<32&&temp>=30)aps+=3;else if(temp<30)aps+=4;
  }
  if(map!==null){
    if(map>=160)aps+=4;else if(map>=130)aps+=3;else if(map>=110)aps+=2;
    else if(map<70&&map>=50)aps+=2;else if(map<50)aps+=4;
  }
  if(hr!==null){
    if(hr>=180)aps+=4;else if(hr>=140)aps+=3;else if(hr>=110)aps+=2;
    else if(hr<55&&hr>=40)aps+=2;else if(hr<40)aps+=4;
  }
  if(rr!==null){
    if(rr>=50)aps+=4;else if(rr>=35)aps+=3;else if(rr>=25)aps+=1;
    else if(rr<10&&rr>=6)aps+=2;else if(rr<6)aps+=4;
  }
  if(pao2){
    if(fio2>=0.5){var aa=Math.max(0,713*fio2-pao2);if(aa>=500)aps+=4;else if(aa>=350)aps+=3;else if(aa>=200)aps+=2;}
    else{if(pao2>70)aps+=0;else if(pao2>=61)aps+=1;else if(pao2>=55)aps+=3;else aps+=4;}
  }
  if(ph!==null){
    if(ph>=7.7)aps+=4;else if(ph>=7.6)aps+=3;else if(ph>=7.5)aps+=1;
    else if(ph<7.33&&ph>=7.25)aps+=2;else if(ph<7.25&&ph>=7.15)aps+=3;else if(ph<7.15)aps+=4;
  }
  if(na!==null){
    if(na>=180)aps+=4;else if(na>=160)aps+=3;else if(na>=155)aps+=2;else if(na>=150)aps+=1;
    else if(na<130&&na>=120)aps+=2;else if(na<120&&na>=111)aps+=3;else if(na<111)aps+=4;
  }
  if(k!==null){
    if(k>=7)aps+=4;else if(k>=6)aps+=3;else if(k>=5.5)aps+=1;
    else if(k<3&&k>=2.5)aps+=2;else if(k<2.5)aps+=4;
  }
  if(cr!==null){
    var cs=0;
    if(cr>=3.5)cs=4;else if(cr>=2)cs=3;else if(cr>=1.5)cs=2;else if(cr<0.6)cs=2;
    if(d.arf==='yes')cs=Math.min(cs*2,8);
    aps+=cs;
  }
  if(hct!==null){
    if(hct>=60)aps+=4;else if(hct>=50)aps+=2;else if(hct>=46)aps+=1;
    else if(hct<30&&hct>=20)aps+=2;else if(hct<20)aps+=4;
  }
  if(wbc!==null){
    if(wbc>=40)aps+=4;else if(wbc>=20)aps+=2;else if(wbc>=15)aps+=1;
    else if(wbc<3&&wbc>=1)aps+=2;else if(wbc<1)aps+=4;
  }
  aps+=Math.max(0,15-gcs);

  var ageS=age>=75?6:age>=65?5:age>=55?3:age>=45?2:0;
  var chrS=ST.pat.chronic==='nonop'?5:ST.pat.chronic==='elective'?2:0;
  var apache=aps+ageS+chrS;

  // ── BISAP ──────────────────────────────────
  var bisap=0,sirs=0;
  if(bun!==null&&bun>25)bisap++;
  if(d.men==='impaired')bisap++;
  if(temp!==null&&(temp>38||temp<36))sirs++;
  if(hr!==null&&hr>90)sirs++;
  if(rr!==null&&rr>20)sirs++;
  if(wbc!==null&&(wbc>12||wbc<4))sirs++;
  if(sirs>=2)bisap++;
  if(age>60)bisap++;
  if(d.ple==='yes')bisap++;

  // ── SOFA ───────────────────────────────────
  var resp=0,coag=0,liver=0,cardio=0,cns=0,renal=0;
  if(pao2&&fio2>0){var pf2=pao2/fio2;if(pf2<100)resp=4;else if(pf2<200)resp=3;else if(pf2<300)resp=2;else if(pf2<400)resp=1;}
  if(plt!==null){if(plt<20)coag=4;else if(plt<50)coag=3;else if(plt<100)coag=2;else if(plt<150)coag=1;}
  if(bi!==null){if(bi>=12)liver=4;else if(bi>=6)liver=3;else if(bi>=2)liver=2;else if(bi>=1.2)liver=1;}
  if(d.vaso==='dopa_high'||d.vaso==='epi')cardio=4;
  else if(d.vaso==='dopa_mid')cardio=3;
  else if(d.vaso==='dopa_low')cardio=2;
  else if(map!==null&&map<70)cardio=1;
  var gcsd=Math.max(0,15-gcs);
  cns=gcsd>=10?4:gcsd>=7?3:gcsd>=4?2:gcsd>=2?1:0;
  if(creat!==null){
    if(creat>=309||(uo!==null&&uo<200))renal=4;
    else if(creat>=221||(uo!==null&&uo<500))renal=3;
    else if(creat>=177)renal=2;else if(creat>=106)renal=1;
  }
  var sofa=resp+coag+liver+cardio+cns+renal;

  // ── mCTSI ──────────────────────────────────
  var ctg=parseInt(d.ctg)||0;
  var nmap={none:0,lt30:2,'30to50':4,gt50:6};
  var mctsi=ctg+(nmap[d.nec]||0)+(d.ext==='yes'?2:0);

  // ── NAPP ───────────────────────────────────
  var napp=(alb!==null&&tp2!==null)?(tp2-alb):null;

  // Цвета
  var apC=apache>=20?'var(--r)':apache>=8?'var(--y)':'var(--g)';
  var biC=bisap>=3?'var(--r)':bisap>=2?'var(--y)':'var(--g)';
  var soC=sofa>=7?'var(--r)':sofa>=4?'var(--y)':'var(--g)';
  var mcC=mctsi>=7?'var(--r)':mctsi>=4?'var(--y)':'var(--g)';

  return {apache,aps,ageS,chrS,apC,
    apMort:apache>=35?'>85%':apache>=25?'~55%':apache>=20?'~40%':apache>=15?'~25%':apache>=10?'~15%':'<10%',
    bisap,sirs,biC,
    biMort:bisap===0?'<1%':bisap===1?'<1%':bisap===2?'3.6%':bisap===3?'5.3%':bisap===4?'12.7%':'22.5%',
    sofa,resp,coag,liver,cardio,cns,renal,soC,
    mctsi,ctg,mcC,
    napp:napp!==null?napp.toFixed(1):null,
    crp,crpC:crp?(tp!=='24h'?(crp>=150?'var(--r)':crp>=100?'var(--y)':'var(--g)'):(crp>100?'var(--y)':'var(--g)')):'var(--t3)',
    map,bun,cr,bi,urea,creat,bili,na,k,wbc,gcs,ph,pao2,fio2};
}

// ═══════════════════════════════════════════════
// RANSON SCORE
// ═══════════════════════════════════════════════
function calcRanson(){
  var d24=D('24h'), d48=D('48h');
  var age=pf(ST.pat.age)||0;
  var pts=[];

  // При поступлении (24ч)
  var r1=age>55; pts.push({lbl:'Возраст >55 лет',val:r1});
  var wbc24=pf(d24.wbc); var r2=wbc24!==null&&wbc24>16; pts.push({lbl:'Лейкоциты >16×10⁹/л',val:r2});
  var gluc24=pf(d24.gluc); var r3=gluc24!==null&&gluc24>11.1; pts.push({lbl:'Глюкоза >11.1 ммоль/л',val:r3});
  var ldh24=pf(d24.ldh); var r4=ldh24!==null&&ldh24>350; pts.push({lbl:'ЛДГ >350 МЕ/л',val:r4});
  var ast24=pf(d24.ast); var r5=ast24!==null&&ast24>250; pts.push({lbl:'АСТ >250 МЕ/л',val:r5});

  // Через 48 часов
  var hct24=pf(d24.hct), hct48=pf(d48.hct);
  var r6=(hct24!==null&&hct48!==null)?(hct24-hct48>10):false;
  pts.push({lbl:'Снижение Ht >10% за 48ч',val:r6,note:'48ч'});

  var urea24=pf(d24.urea), urea48=pf(d48.urea);
  var r7=(urea24!==null&&urea48!==null)?(urea48-urea24>1.8):false;
  pts.push({lbl:'Рост мочевины >1.8 ммоль/л за 48ч',val:r7,note:'48ч'});

  var ca48=pf(d48.ca); var r8=ca48!==null&&ca48<2.0; pts.push({lbl:'Ca <2.0 ммоль/л (48ч)',val:r8,note:'48ч'});
  var pao248=pf(d48.pao2); var r9=pao248!==null&&pao248<60; pts.push({lbl:'PaO₂ <60 мм рт.ст. (48ч)',val:r9,note:'48ч'});
  var bd48=pf(d48.basedef); var r10=bd48!==null&&bd48>4; pts.push({lbl:'Дефицит оснований >4 мэкв/л (48ч)',val:r10,note:'48ч'});
  var fs48=pf(d48.fluidseq); var r11=fs48!==null&&fs48>6; pts.push({lbl:'Секвестрация жидкости >6 л (48ч)',val:r11,note:'48ч'});

  var score=pts.filter(function(p){return p.val;}).length;
  var mort=score<=2?'<1%':score<=4?'~15%':score<=6?'~40%':'>50%';
  var sev=score<=2?'g':score<=4?'y':'r';
  var sevLbl=score<=2?'Лёгкий':score<=4?'Средней тяжести':score<=6?'Тяжёлый':'Крайне тяжёлый';
  return {score,pts,mort,sev,sevLbl};
}

function calcDzhanelidge(tp){
  var d=D(tp);
  var crit=[];
  var sbp=pf(d.sbp), uo=pf(d.uo), wbc=pf(d.wbc), gluc=pf(d.gluc), urea=pf(d.urea), hb=pf(d.hb);

  crit.push({lbl:'Перитонеальные симптомы',       auto:false, val:d.dzh_peritoneal==='yes'});
  crit.push({lbl:'Олигурия <250 мл/12ч',          auto:true,  val:uo!==null&&uo<500, hint:uo?uo+' мл/сут':'нет данных'});
  crit.push({lbl:'АД сист. <100 мм рт.ст.',       auto:true,  val:sbp!==null&&sbp<100, hint:sbp?sbp+' мм рт.ст.':'нет данных'});
  crit.push({lbl:'Энцефалопатия',                 auto:false, val:d.dzh_enceph==='yes'});
  crit.push({lbl:'Hb >160 г/л',                   auto:true,  val:hb!==null&&hb>160, hint:hb?hb+' г/л':'нет данных'});
  crit.push({lbl:'Лейкоциты >14 000/мкл',         auto:true,  val:wbc!==null&&wbc>14, hint:wbc?wbc+'×10⁹/л':'нет данных'});
  crit.push({lbl:'Глюкоза >10 ммоль/л',           auto:true,  val:gluc!==null&&gluc>10, hint:gluc?gluc+' ммоль/л':'нет данных'});
  crit.push({lbl:'Мочевина >12 ммоль/л',          auto:true,  val:urea!==null&&urea>12, hint:urea?urea+' ммоль/л':'нет данных'});
  crit.push({lbl:'Метаболич. изменения на ЭКГ',   auto:false, val:d.dzh_ecg==='yes'});
  crit.push({lbl:'Вишнёвый/чёрный экссудат (лапароскопия)',auto:false,val:d.dzh_exudate==='yes'});
  crit.push({lbl:'Распространённый парапанкреатит (выходит из сальниковой сумки)',auto:false,val:d.dzh_parapanc==='yes'});
  crit.push({lbl:'Стеатонекрозы',                  auto:false, val:d.dzh_steatonec==='yes'});
  crit.push({lbl:'Нет эффекта от инфузионной терапии',auto:false,val:d.dzh_nofluid==='yes'});

  var score=crit.filter(function(c){return c.val;}).length;
  var sev=score>=5?'r':score>=2?'y':'g';
  var sevLbl=score>=5?'Тяжёлый':score>=2?'Средней тяжести':'Лёгкий';
  return {score,crit,sev,sevLbl};
}

function confirmed(){ return (ST.diag.pain?1:0)+(ST.diag.enzymes?1:0)+(ST.diag.imaging?1:0)>=2; }

// RENDER CONTROLLER

function R(){
  // Обновляем только badge и nav — без потери фокуса если уже в контенте
  var abbr=getPatAbbr();
  var cnt=critCnt(),ok=confirmed();
  var b=document.getElementById('dbadge');
  b.className='dbadge '+(ok?'ok':'warn');
  b.textContent=(abbr?abbr+' · ':'')+(ok?'✅ ОП подтверждён ('+cnt+'/3)':'⚠ Диагноз: '+cnt+'/3');

  // Nav
  var nav=document.getElementById('snav');
  nav.innerHTML=STEPS.map(function(s,i){
    var locked=i>0&&!ok;
    var cls='sb'+(ST.step===i?' active':'')+(i<ST.step&&!locked?' done':'')+(locked?' locked':'');
    var dot=i<ST.step&&!locked?'✓':(i+1);
    return '<button class="'+cls+'" onclick="goto('+i+')"'+(locked?' disabled':'')+'>'+
      '<span class="snum">'+dot+'</span>'+s.ico+' '+s.lbl+'</button>';
  }).join('');

  // Content — только если нет активного input в фокусе
  var focused=document.activeElement;
  var inInput=focused&&(focused.tagName==='INPUT'||focused.tagName==='SELECT')&&focused.closest('#main');
  if(!inInput){
    DB.saveCurrent();
    renderContent();
  } else {
    updateHints();
  }
}

function renderContent(){
  var m=document.getElementById('main');
  var id=STEPS[ST.step].id;
  var html='';
  if(id==='diag')html=pageDiag();
  else if(id==='pat')html=pagePat();
  else if(id==='vitals')html=pageVitals();
  else if(id==='labs')html=pageLabs();
  else if(id==='gas')html=pageGas();
  else if(id==='scores')html=pageScores();
  else if(id==='dyn')html=pageDyn();
  else if(id==='rem')html=pageRem();
  else if(id==='drain')html=pageDrain();
  else if(id==='surg')html=pageSurg();
  else if(id==='report')html=pageReport();
  m.innerHTML=html;
}

// Обновление hint-spans без потери фокуса
function updateHints(){
  var tp=ST.tp,d=D(tp);
  var urea=pf(d.urea),creat=pf(d.creat),bili=pf(d.bili);
  var na=pf(d.na),k=pf(d.k),alb=pf(d.alb),tp2=pf(d.tp),crp=pf(d.crp);
  var sbp=pf(d.sbp),dbp=pf(d.dbp);
  var pao2=pf(d.pao2),fio2=pf(d.fio2)||0.21;

  function upd(id,html){ var el=document.getElementById(id); if(el)el.innerHTML=html; }

  if(sbp&&dbp){upd('hint_map','MAP = ('+d.sbp+' + 2×'+d.dbp+') / 3 = <b style="color:var(--c)">'+(((sbp+2*dbp)/3)|0)+' мм рт.ст.</b>');}
  if(urea){ var bun=urea2bun(urea); upd('hint_urea',urea.toFixed(1)+' ммоль/л = BUN '+bun.toFixed(1)+' мг/дл'+(urea>8.93?' <b style="color:var(--r)">⚠ BISAP >25 мг/дл</b>':'')); }
  if(creat){ var cr=cr2mgdl(creat); upd('hint_creat',creat+' мкмоль/л = '+cr.toFixed(2)+' мг/дл'+(creat>=309?' <b style="color:var(--r)">SOFA 4</b>':creat>=221?' <b style="color:var(--y)">SOFA 3</b>':creat>=177?' SOFA 2':creat>=106?' SOFA 1':'')); }
  if(bili){ var bi=bi2mgdl(bili); upd('hint_bili',bili+' мкмоль/л = '+bi.toFixed(2)+' мг/дл'+(bili>=205?' <b style="color:var(--r)">SOFA 4</b>':bili>=102?' <b style="color:var(--y)">SOFA 3</b>':bili>=34?' SOFA 2':bili>=20?' SOFA 1':'')); }
  if(na){ upd('hint_na','Na: '+(na<130?'⚠ Гипонатриемия':na>150?'⚠ Гипернатриемия':'В норме (130–150)')); }
  if(k){ upd('hint_k','K: '+(k<3.5?'⚠ Гипокалиемия':k>5.5?'⚠ Гиперкалиемия':'В норме (3.5–5.5)')); }
  if(alb&&tp2){ var n=tp2-alb; upd('hint_napp','NAPP = '+tp2+' − '+alb+' = <b style="color:'+(n>30?'var(--r)':'var(--g)')+'">'+n.toFixed(1)+' г/л</b>'+(n>30?' ⚠ >30 г/л — риск тяжёлого':'  ✅ норма')); }
  if(crp){ upd('hint_crp','CРБ '+crp+' мг/л → '+(tp==='24h'?'Пик ожидается к 48ч':crp>=150?'<b style="color:var(--r)">≥150 мг/л = тяжёлый ОП</b>':crp>=100?'<b style="color:var(--y)">100–149 — умеренный риск</b>':'<100 мг/л — лёгкое течение')); }
  if(pao2&&fio2){ var pf3=Math.round(pao2/fio2); upd('hint_pf','PaO₂/FiO₂ = <b style="color:var(--c)">'+pf3+'</b> → '+(pf3<100?'<b style="color:var(--r)">Тяж. ДН (SOFA 4)</b>':pf3<200?'<b style="color:var(--r)">ДН (SOFA 3)</b>':pf3<300?'<b style="color:var(--y)">Умер. (SOFA 2)</b>':pf3<400?'Лёгкая (SOFA 1)':'Норма (0)')); }
  
  // pH hint
  var ph=pf(d.ph);
  if(ph){ upd('hint_ph','pH '+ph.toFixed(2)+' → '+(ph>=7.7?'<b style="color:var(--r)">APACHE +4</b>':ph>=7.6?'<b style="color:var(--r)">APACHE +3</b>':ph>=7.5?'<b style="color:var(--y)">APACHE +1</b>':ph>=7.33?'<span style="color:var(--g)">Норма (0)</span>':ph>=7.25?'<b style="color:var(--y)">APACHE +2</b>':ph>=7.15?'<b style="color:var(--r)">APACHE +3</b>':'<b style="color:var(--r)">APACHE +4</b>')); }
}

function checkEnz(){
  var a=pf(ST.diag.amylase),l=pf(ST.diag.lipase);
  if((!a||isNaN(a))&&(!l||isNaN(l)))return;
  if((a&&a>=300)||(l&&l>=180))ST.diag.enzymes=true;
}
function sinceOnset(){
  try{
    var dt=new Date(ST.onset+(ST.onsetT?'T'+ST.onsetT:'T00:00'));
    var h=Math.floor((Date.now()-dt)/3600000);
    if(h<0)return 'в будущем';
    if(h<24)return h+' ч';
    return Math.floor(h/24)+' дн '+(h%24)+' ч';
  }catch(e){return '—';}
}

function pagePat(){

  var bmiNote=bmi?( bmi<18.5?'↓ Дефицит (<18.5)':bmi<25?'✅ Норма (18.5–24.9)':bmi<30?'⚠ Избыток (25–29.9)':bmi<35?'🔴 Ожирение I (30–34.9)':bmi<40?'🔴 Ожирение II (35–39.9)':'🔴 Ожирение III (≥40)'):'';

// Формирование краткого имени из ФИО
function makeShortName(str){
  if(!str)return '';
  str=str.trim();
  // Если уже в формате "Ив.В.А." — вернуть как есть
  if(/^[А-ЯЁ][а-яё]+\s[А-ЯЁ]\.[А-ЯЁ]\.$/.test(str))return str;
  var parts=str.split(/\s+/);
  if(parts.length===1)return parts[0].substring(0,3).toUpperCase();
  var fam=parts[0];
  var inits=parts.slice(1).map(function(p){return p[0]?p[0].toUpperCase()+'.':''}).join('');
  return fam+' '+inits;
}

// Получить аббревиатуру ФИО для заголовка (3 буквы)
function getPatAbbr(){
  var p=ST.pat;
  if(!p.initials)return '';
  var str=p.initials.trim();
  var parts=str.split(/\s+/);
  if(parts.length>=3){
    return (parts[0][0]||'')+(parts[1][0]||'')+(parts[2][0]||'');
  } else if(parts.length===2){
    return (parts[0].substring(0,2)+(parts[1][0]||'')).toUpperCase();
  }
  return str.substring(0,3).toUpperCase();
}

      '<div style="margin-bottom:11px">'+dSel('КТ-степень (Balthazar A–E)',tp,'ctg',[
        ['0','A — Норма (0 б)'],['1','B — Увеличение ПЖ (1 б)'],
        ['2','C — Воспаление окр. клетчатки (2 б)'],

      ])+'</div>'+
      '<div style="margin-bottom:11px">'+dSel('Некроз поджелудочной железы',tp,'nec',[
        ['none','Нет (0 б)'],['lt30','<30% (2 б)'],['30to50','30–50% (4 б)'],['gt50','>50% (6 б)']
      ])+'</div>'+
      dSel('Внепанкреатические осложнения',tp,'ext',[['no','Нет (0 б)'],['yes','Есть: выпот / тромбоз / псевдоаневризма (+2 б)']])+
      '<div class="ib" style="margin-top:9px">mCTSI = Balthazar '+ctg+' + Некроз '+(nm[d.nec]||0)+' + Внепанкр. '+(d.ext==='yes'?2:0)+' = <b style="color:var(--c)">'+mctsi+' / 10</b> → '+
        (mctsi<=1?'<span style="color:var(--g)">Лёгкий · летальность ~0%</span>':mctsi<=3?'<span style="color:var(--g)">Лёгкий · летальность ~3%</span>':mctsi<=6?'<span style="color:var(--y)">Средний · летальность ~6%</span>':'<span style="color:var(--r)">Тяжёлый · летальность ~17%</span>')+
        '<span style="font-size:10px;color:var(--t3);margin-left:6px">doi: 0.3389/fphys.2019.01002</span>'+

}

// ── РЕЗУЛЬТАТЫ ─────────────────────────────────
function pageScores(){
  var sc=calc(ST.tp),d=D(ST.tp),tp=ST.tp;
  function col(c){ return c==='g'?'var(--g)':c==='y'?'var(--y)':'var(--r)'; }

  function scCard(name,full,val,c,rows,verd,verd2){
    return '<div class="sc" style="border-color:'+c+'44">'+
      '<div class="sch" style="background:'+c+'12;border-color:'+c+'33">'+
        '<div><div class="scn">'+name+'</div><div class="scfn">'+full+'</div></div>'+
        '<div class="scv" style="color:'+c+'">'+val+'</div>'+
      '</div>'+
      '<div class="scb">'+
        rows.map(function(r){
          return '<div class="sr"><span class="srl">'+r[0]+'</span><span class="srv" style="color:'+(r[2]||'var(--t)')+'">'+r[1]+'</span></div>';
        }).join('')+
        '<div class="svrd" style="background:'+c+'15;border-color:'+c+'33">'+
          '<div class="svt" style="color:'+c+'">'+verd+'</div>'+
          (verd2?'<div class="svs">'+verd2+'</div>':'')+
        '</div>'+
      '</div>'+
    '</div>';
  }

  var biSev=sc.bisap>=3?'Тяжёлый':sc.bisap>=2?'Средней тяжести':'Лёгкий';
  var apSev=sc.apache>=20?'Крайне тяжёлый':sc.apache>=12?'Тяжёлый':sc.apache>=8?'Средней тяжести':'Лёгкий';
  var soSev=sc.sofa>=7?'Полиорганная нед.':sc.sofa>=4?'Тяжёлая дисф.':sc.sofa>=2?'Умеренная дисф.':'Минимальная';
  var mcSev=sc.mctsi>=7?'Тяжёлый':sc.mctsi>=4?'Средней тяжести':sc.mctsi>=2?'Лёгкий':'Лёгкий';
  var mcMort=sc.mctsi>=7?'~17%':sc.mctsi>=4?'~6%':sc.mctsi>=2?'~3%':'<1%';

  // SIRS
  var sirsType=d.sirs_type||'none';
  var sirsMort=sirsType==='persistent'?'25.4%':sirsType==='transient'?'8%':'—';
  var sirsC2=sirsType==='persistent'?'var(--r)':sirsType==='transient'?'var(--y)':'var(--t3)';

  // Ranson
  var ran=calcRanson();
  var ranC=ran.sev==='r'?'var(--r)':ran.sev==='y'?'var(--y)':'var(--g)';

  // Джанелидзе
  var dzh=calcDzhanelidge(tp);
  var dzhC=dzh.sev==='r'?'var(--r)':dzh.sev==='y'?'var(--y)':'var(--g)';

  var sev=sc.apache>=8||sc.bisap>=3||sc.sofa>=6||ran.score>=3||dzh.score>=5?'r':
          sc.apache>=5||sc.bisap>=2||sc.sofa>=3||ran.score>=2||dzh.score>=2?'y':'g';
  var sevC=sev==='r'?'var(--r)':sev==='y'?'var(--y)':'var(--g)';
  var sevL=sev==='r'?'🚨 ТЯЖЁЛЫЙ ОП':sev==='y'?'⚠️ СРЕДНЕЙ ТЯЖЕСТИ':'✅ ЛЁГКИЙ ОП';

  return '<div class="fi-anim">'+
  tpTabs()+
  '<div class="sgrid">'+

  scCard('BISAP','Bedside Index Severity AP',sc.bisap,sc.biC,[
    ['BUN >25 мг/дл (мочевина >8.93 ммоль/л)',sc.bun&&sc.bun>25?'+1':'0',sc.bun&&sc.bun>25?'var(--r)':'var(--t2)'],
    ['Нарушение сознания',d.men==='impaired'?'+1':'0'],
    ['SIRS ≥2 критерия (сейчас '+sc.sirs+'/4)',sc.sirs>=2?'+1':'0',sc.sirs>=2?'var(--r)':'var(--t2)'],
    ['Возраст >60 лет',(pf(ST.pat.age)||0)>60?'+1':'0'],
    ['Плевральный выпот',d.ple==='yes'?'+1':'0']
  ],biSev,'Летальность ≈ '+sc.biMort)+

  scCard('APACHE II','Acute Physiology & Chronic Health',sc.apache,sc.apC,[
    ['APS (12 физиол. переменных)',sc.aps+' / 60'],
    ['Возрастной балл','+'+sc.ageS+' / 6'],
    ['Хронические заболевания','+'+sc.chrS+' / 5'],
    ['ИТОГО',sc.apache,sc.apC]
  ],apSev,'Летальность ≈ '+sc.apMort+(tp==='24h'?' · ⚠ пересчитать при 48ч':''))+

  scCard('SOFA','Sequential Organ Failure Assessment',sc.sofa,sc.soC,[
    ['Дыхание (PaO₂/FiO₂)',sc.resp+'/4',sc.resp>=3?'var(--r)':sc.resp>=2?'var(--y)':'var(--t2)'],
    ['Коагуляция (тромбоциты)',sc.coag+'/4',sc.coag>=3?'var(--r)':sc.coag>=2?'var(--y)':'var(--t2)'],
    ['Печень (билирубин мкмоль/л)',sc.liver+'/4',sc.liver>=3?'var(--r)':sc.liver>=2?'var(--y)':'var(--t2)'],
    ['Кардио (вазопрессоры/MAP)',sc.cardio+'/4',sc.cardio>=3?'var(--r)':sc.cardio>=2?'var(--y)':'var(--t2)'],
    ['ЦНС (ШКГ)',sc.cns+'/4'],
    ['Почки (кр-н мкмоль/л / диурез)',sc.renal+'/4',sc.renal>=3?'var(--r)':sc.renal>=2?'var(--y)':'var(--t2)']
  ],soSev,(sc.sofa>=2?'⚠ SOFA ≥2 → летальность >10%':'SOFA <2 → летальность <10%'))+

  scCard('mCTSI','Modified CT Severity Index',sc.mctsi,sc.mcC,[
    ['Balthazar (A→E)',sc.ctg+' / 4'],
    ['Некроз ПЖ',sc.mctsi-sc.ctg-(d.ext==='yes'?2:0)+' / 6'],
    ['Внепанкреат. осл.',d.ext==='yes'?'2 / 2':'0 / 2']
  ],mcSev,'Летальность ≈ '+mcMort+' · doi: 10.3389/fphys.2019.01002')+

  // Ranson
  scCard('Ranson','Критерии Ranson (при поступлении + 48ч)',ran.score,ranC,[
    ['Возраст >55 лет',ran.pts[0].val?'+1':'0',ran.pts[0].val?'var(--r)':'var(--t2)'],
    ['Лейкоциты >16×10⁹/л',ran.pts[1].val?'+1':'0',ran.pts[1].val?'var(--r)':'var(--t2)'],
    ['Глюкоза >11.1 ммоль/л',ran.pts[2].val?'+1':'0',ran.pts[2].val?'var(--r)':'var(--t2)'],
    ['ЛДГ >350 МЕ/л',ran.pts[3].val?'+1':'0',ran.pts[3].val?'var(--r)':'var(--t2)'],
    ['АСТ >250 МЕ/л',ran.pts[4].val?'+1':'0',ran.pts[4].val?'var(--r)':'var(--t2)'],
    ['↓Ht >10% за 48ч',ran.pts[5].val?'+1':'0',ran.pts[5].val?'var(--r)':'var(--t2)'],
    ['↑Мочевина >1.8 ммоль/л за 48ч',ran.pts[6].val?'+1':'0',ran.pts[6].val?'var(--r)':'var(--t2)'],
    ['Ca <2.0 ммоль/л (48ч)',ran.pts[7].val?'+1':'0',ran.pts[7].val?'var(--r)':'var(--t2)'],
    ['PaO₂ <60 мм рт.ст. (48ч)',ran.pts[8].val?'+1':'0',ran.pts[8].val?'var(--r)':'var(--t2)'],
    ['Дефицит осн. >4 мэкв/л (48ч)',ran.pts[9].val?'+1':'0',ran.pts[9].val?'var(--r)':'var(--t2)'],
    ['Секвестр. жидкости >6 л (48ч)',ran.pts[10].val?'+1':'0',ran.pts[10].val?'var(--r)':'var(--t2)']
  ],ran.sevLbl,'Летальность: ≤2 б → <1% · 3–4 б → ~15% · 5–6 б → ~40% · ≥7 б → >50%')+

  // Шкала Джанелидзе
  (function(){
    var dz=calcDzhanelidge(tp);
    var c=dzhC;
    var rows=dz.crit.map(function(cr){
      return [cr.lbl+(cr.auto&&cr.hint?' ('+cr.hint+')':''),cr.val?'+1':'0',cr.val?'var(--r)':'var(--t2)'];
    });
    return scCard('Джанелидзе','Шкала Джанелидзе (инфицированный некроз)',dz.score,c,rows,
      dz.sevLbl,'0–1: лёгкий · 2–4: средней тяжести · ≥5: тяжёлый');
  })()+

  // SIRS отдельная карточка
  '<div class="sc" style="border-color:'+sirsC2+'44">'+
    '<div class="sch" style="background:'+sirsC2+'12;border-color:'+sirsC2+'33">'+
      '<div><div class="scn">SIRS</div><div class="scfn">Системный воспалительный ответ</div></div>'+
      '<div class="scv" style="color:'+sirsC2+'">'+sc.sirs+'/4</div>'+
    '</div>'+
    '<div class="scb">'+
      ['Т >38 или <36°C','ЧСС >90/мин','ЧДД >20/мин','Лейк. >12 или <4×10⁹/л'].map(function(lbl,i){
        var v=[pf(d.temp)!==null&&(pf(d.temp)>38||pf(d.temp)<36),
               pf(d.hr)!==null&&pf(d.hr)>90,
               pf(d.rr)!==null&&pf(d.rr)>20,
               pf(d.wbc)!==null&&(pf(d.wbc)>12||pf(d.wbc)<4)][i];
        return '<div class="sr"><span class="srl">'+lbl+'</span><span class="srv" style="color:'+(v?'var(--r)':'var(--t2)')+'">'+( v?'✓ Да':'—')+'</span></div>';
      }).join('')+
      '<div class="sr"><span class="srl">Продолжительность</span><span class="srv" style="color:'+sirsC2+'">'+
        (sirsType==='persistent'?'🔴 Персистирующий':sirsType==='transient'?'⏱ Транзиторный':'Не указана')+
      '</span></div>'+
      (sirsType!=='none'?
        '<div class="svrd" style="background:'+sirsC2+'15;border-color:'+sirsC2+'33">'+
          '<div class="svt" style="color:'+sirsC2+'">Летальность: '+sirsMort+'</div>'+
          '<div class="svs">doi: 10.1002/bjs.5290 · транзит. 8% · персист. 25.4%</div>'+
        '</div>':'')+
    '</div>'+
  '</div>'+

  // NAPP + CRP
  '<div class="sc" style="border-color:'+(sc.napp&&parseFloat(sc.napp)>30?'var(--r)':'var(--bd)')+'44">'+
    '<div class="sch" style="background:var(--bg3);border-color:var(--bd)">'+
      '<div><div class="scn">NAPP / CРБ</div><div class="scfn">Белки и воспаление</div></div>'+
      '<div class="scv" style="color:'+(sc.napp&&parseFloat(sc.napp)>30?'var(--r)':'var(--g)')+';font-size:18px;padding-top:4px">'+
        (sc.napp?sc.napp+' г/л':'—')+'</div>'+
    '</div>'+
    '<div class="scb">'+
      '<div class="sr"><span class="srl">Общий белок</span><span class="srv">'+(d.tp?d.tp+' г/л':'—')+'</span></div>'+
      '<div class="sr"><span class="srl">Альбумин</span><span class="srv">'+(d.alb?d.alb+' г/л':'—')+'</span></div>'+
      '<div class="sr"><span class="srl">NAPP = ОБ − Альб</span><span class="srv" style="color:'+(sc.napp&&parseFloat(sc.napp)>30?'var(--r)':'var(--g)')+'">'+(sc.napp?sc.napp+' г/л':'—')+'</span></div>'+
      (sc.napp?'<div class="svrd" style="background:'+(parseFloat(sc.napp)>30?'#ef434315':'#10c98a15')+';border-color:'+(parseFloat(sc.napp)>30?'#ef434333':'#10c98a33')+'">'+
        '<div class="svt" style="color:'+(parseFloat(sc.napp)>30?'var(--r)':'var(--g)')+'">'+(parseFloat(sc.napp)>30?'⚠ Риск тяжёлого течения':'✅ В норме')+'</div>'+
        '<div class="svs">Порог: NAPP >30 г/л</div>'+
      '</div>':'')+
      '<div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:10px">'+
        '<div class="sr"><span class="srl">CРБ ('+tp+')</span><span class="srv" style="color:'+sc.crpC+'">'+(sc.crp?sc.crp+' мг/л':'—')+'</span></div>'+
        (sc.crp?'<div class="fconv">'+(tp==='24h'?'Пик ожидается к 48ч':sc.crp>=150?'<b style="color:var(--r)">≥150 мг/л = тяжёлый ОП</b>':sc.crp>=100?'<b style="color:var(--y)">100–149 — умеренный</b>':'<100 мг/л — лёгкое течение')+'</div>':'')+
      '</div>'+
    '</div>'+
  '</div>'+

  // Итоговый вердикт
  '<div class="sc" style="border-color:'+sevC+'55;grid-column:1/-1">'+
    '<div class="sch" style="background:'+sevC+'18;border-color:'+sevC+'44">'+
      '<div><div class="scn" style="font-size:16px">'+sevL+'</div><div class="scfn">Итоговая оценка · '+tp+'</div></div>'+
    '</div>'+
    '<div class="scb">'+
      '<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px">'+
        [['BISAP',sc.bisap,'/5'],['APACHE II',sc.apache,''],['SOFA',sc.sofa,'/24'],['mCTSI',sc.mctsi,'/10'],['Ranson',ran.score,'/11'],['Джанел.',dzh.score,'/13']].map(function(x){
          return '<div style="text-align:center">'+
            '<div style="font-size:10px;color:var(--t2);text-transform:uppercase">'+x[0]+'</div>'+
            '<div style="font-size:22px;font-weight:700;font-family:\'Courier New\';color:'+sevC+'">'+x[1]+'<span style="font-size:11px;color:var(--t3)">'+x[2]+'</span></div>'+
          '</div>';
        }).join('')+
      '</div>'+
      (sirsType!=='none'?
        '<div style="padding:7px 11px;border-radius:6px;background:'+sirsC2+'15;border:1px solid '+sirsC2+'33;font-size:12px;margin-top:4px">'+
          '<b style="color:'+sirsC2+'">SIRS '+( sirsType==='persistent'?'персистирующий → летальность 25.4%':'транзиторный → летальность 8%')+'</b>'+
        '</div>':'')+
    '</div>'+
  '</div>'+

  '</div>'+
  nav2('← Назад','Динамика →')+
  '</div>';
}

// ── ДИНАМИКА ───────────────────────────────────
function pageDyn(){
  var tps=['24h','48h','72h'];
  function col(c){ return c==='g'?'var(--g)':c==='y'?'var(--y)':'var(--r)'; }
  var rows=[
    {lbl:'BISAP',max:5,get:function(sc){return sc.bisap;},gc:function(sc){return sc.bisap>=3?'r':sc.bisap>=2?'y':'g';}},
    {lbl:'APACHE II',max:71,get:function(sc){return sc.apache;},gc:function(sc){return sc.apache>=12?'r':sc.apache>=8?'y':'g';}},
    {lbl:'SOFA',max:24,get:function(sc){return sc.sofa;},gc:function(sc){return sc.sofa>=7?'r':sc.sofa>=4?'y':'g';}},
    {lbl:'mCTSI',max:10,get:function(sc){return sc.mctsi;},gc:function(sc){return sc.mctsi>=7?'r':sc.mctsi>=4?'y':'g';}},
    {lbl:'Ranson',max:11,getR:true,get:function(){return calcRanson().score;},gc:function(){var s=calcRanson().score;return s>=5?'r':s>=3?'y':'g';}},
    {lbl:'Джанелидзе',max:13,getDzh:true,get:function(sc,t){return calcDzhanelidge(t).score;},gc:function(sc,t){var s=calcDzhanelidge(t).score;return s>=5?'r':s>=2?'y':'g';}},
    {lbl:'NAPP г/л',max:60,get:function(sc){return sc.napp?parseFloat(sc.napp):null;},gc:function(sc){return sc.napp&&parseFloat(sc.napp)>30?'r':'g';}},
    {lbl:'CРБ мг/л',max:400,get:function(sc){return sc.crp;},gc:function(sc){return sc.crp?(sc.crp>=150?'r':sc.crp>=100?'y':'g'):'g';}}
  ];
  return '<div class="fi-anim">'+
  '<div class="al al-i">Данные 24ч / 48ч / 72ч вводятся на вкладках «Витальные» и «Анализы»</div>'+
  '<div class="card">'+
    '<div class="ch"><span>📈</span><span class="ct">Сравнение 24 / 48 / 72 часа</span></div>'+
    '<div class="cb" style="padding:0;overflow-x:auto">'+
      '<table class="ctbl">'+
        '<thead><tr><th>Шкала</th>'+tps.map(function(t){return '<th style="color:var(--c);text-align:center">'+t+'</th>';}).join('')+'<th>Тренд</th></tr></thead>'+
        '<tbody>'+
          rows.map(function(row){
            var vals=tps.map(function(t){
              if(!ST.data[t]||ST.data[t].temp===undefined)return null;
              if(row.getDzh)return calcDzhanelidge(t).score;
              if(row.getR)return calcRanson().score;
              return row.get(calc(t));
            });
            var nums=vals.filter(function(v){return v!==null&&!isNaN(v);});
            var trend='—',tc='';
            if(nums.length>=2){
              var diff=nums[nums.length-1]-nums[0];
              if(diff>1){trend='↑ Ухудш.';tc='tu';}
              else if(diff<-1){trend='↓ Улучш.';tc='td';}
              else{trend='→ Стаб.';tc='tf';}
            }
            return '<tr><td style="font-weight:600">'+row.lbl+'</td>'+
              vals.map(function(v,i){
                var t2=tps[i];
                var hasD=ST.data[t2]&&ST.data[t2].temp!==undefined;
                var sc2=hasD?calc(t2):null;
                var colorKey=row.getDzh?row.gc(null,t2):row.gc(sc2,t2);
                var c=hasD?(colorKey==='r'?'var(--r)':colorKey==='y'?'var(--y)':'var(--g)'):'var(--t3)';
                var pct=v!==null&&!isNaN(v)?Math.min(v/row.max*100,100):0;
                return '<td style="text-align:center">'+
                  '<div class="tpv" style="color:'+c+'">'+(v!==null&&!isNaN(v)?v:'—')+'</div>'+
                  '<div style="height:3px;background:var(--bd);border-radius:2px;margin-top:3px;overflow:hidden">'+
                    '<div style="height:100%;width:'+pct+'%;background:'+c+'"></div>'+
                  '</div>'+
                '</td>';
              }).join('')+
              '<td class="'+tc+'" style="font-weight:700;white-space:nowrap">'+trend+'</td></tr>';
          }).join('')+
        '</tbody>'+
      '</table>'+
    '</div>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px">'+
    tps.map(function(t){
      if(!ST.data[t]||ST.data[t].temp===undefined) return '<div class="card" style="padding:13px;text-align:center;color:var(--t3);font-size:12px">Нет данных<br><b>'+t+'</b></div>';
      var sc=calc(t);
      var sv=sc.apache>=8||sc.bisap>=3||sc.sofa>=6?'r':sc.apache>=5||sc.bisap>=2||sc.sofa>=3?'y':'g';
      var c=sv==='r'?'var(--r)':sv==='y'?'var(--y)':'var(--g)';
      var l=sv==='r'?'ТЯЖЁЛЫЙ':sv==='y'?'СРЕДНИЙ':'ЛЁГКИЙ';
      return '<div class="card" style="border-color:'+c+'44"><div style="padding:11px;text-align:center">'+
        '<div style="font-family:\'Courier New\';font-size:17px;color:var(--c);font-weight:700">'+t+'</div>'+
        '<div style="font-weight:700;color:'+c+';font-size:13px;margin-top:4px">'+l+'</div>'+
        '<div style="font-size:10px;color:var(--t3);margin-top:3px">AP'+sc.apache+'·BI'+sc.bisap+'·SO'+sc.sofa+'·CT'+sc.mctsi+'</div>'+
      '</div></div>';
    }).join('')+
  '</div>'+
  nav2('← Назад','Напоминания →')+
  '</div>';
}

var REMS={

function pageDrain(){
  var ds=ST.dr;

  // ── Авто-синхронизация объёма некроза из данных МСКТ (КЩС/КТ шаг) ──
  var ctNec=null;
  ['72h','48h','24h'].forEach(function(tp){
    if(!ctNec&&ST.data[tp]&&ST.data[tp].nec&&ST.data[tp].nec!=='none'){
      ctNec=ST.data[tp].nec;
    }
  });
  if(ctNec){
    // gt50 → large (≥50%), остальное → small (<50%)
    ST.dr.nec = ctNec==='gt50' ? 'large' : 'small';
    // Синхронизация с калькулятором объёма вмешательства
    if(!ST.surg.necrosis){
      ST.surg.necrosis = ctNec==='gt50'?'8':ctNec==='30to50'?'5':'0';
    }
  }
  var steps=[];
  if(ds.inf){
    steps.push({ico:'💊',lbl:'ШАГ 1: Антибиотикотерапия',det:'Карбапенемы (меропенем 1г × 3/сут) или фторхинолоны + метронидазол. Начать немедленно при подтверждённом инфицировании.',urgent:true});
    if(ds.timing==='early'){
      steps.push({ico:'⏳',lbl:'ШАГ 2: Отсрочить инвазию ≥4 нед',det:'Выждать формирование WON (отграниченного некроза). Агрессивная консервативная терапия. Энтеральное питание (назоеюнальный зонд).',urgent:false});
      steps.push({ico:'🔵',lbl:'ШАГ 3: ЧКД как bridge-терапия',det:'Чрескожное дренирование при сепсисе / клин. ухудшении. Катетер 12–16 Fr, КТ/УЗ-наведение. Временная мера до некрэктомии.',urgent:ds.stab==='unstable'});
    } else {
      if(ds.loc==='perigastric'){
        steps.push({ico:'🎯',lbl:'ШАГ 2: EUS-дренирование трансгастральное',det:'Метод выбора при перигастральном WON. LAMS-стенты или пластиковые. Эффективность 80–90%. Минимально инвазивно.',urgent:false});
        if(ds.nec==='large') steps.push({ico:'🔬',lbl:'ШАГ 3: Эндоскопическая некрэктомия (DEET)',det:'При неэффективности дренирования. 3–5 сессий через трансгастральный доступ с интервалом 48–72 ч.',urgent:false});
      } else {
        steps.push({ico:'🔵',lbl:'ШАГ 2: Чрескожное дренирование (ЧКД)',det:'Первая линия при ретроперитонеальном некрозе. КТ-наведение, катетер 12–30 Fr. Оставить до <10 мл/сут.',urgent:false});
        steps.push({ico:'🎬',lbl:'ШАГ 3: VARD / MIRPN',det:'Видеоассистированная ретроперитонеальная дебридация через дренажный канал. Step-up подход (PANTER trial NEJM 2010).',urgent:false});
      }
      if(ds.stab==='unstable'||ds.nec==='large') steps.push({ico:'🏥',lbl:'ШАГ 4: Открытая некрэктомия',det:'Резерв: нестабильность при МИ-подходе, массивный сепсис, кишечный свищ, аррозивное кровотечение.',urgent:ds.stab==='unstable'});
    }
  }
  return '<div class="fi-anim">'+
  '<div class="card">'+
    '<div class="ch"><span>🩺</span><span class="ct">Метод дренирования панкреонекроза</span></div>'+
    '<div class="cb">'+
      '<div style="margin-bottom:13px"><div class="sl">Признаки инфицирования некроза</div>'+
        '<div class="tg">'+
          '<button class="tb'+(ds.inf?' onr':' ong')+'" onclick="ST.dr.inf=!ST.dr.inf;R()">'+
            (ds.inf?'⚠ Да — есть инфицирование':'✅ Нет — стерильный некроз')+'</button>'+
        '</div>'+
        '<div class="ib" style="margin-top:7px">КТ: газ в некрозе · Лихорадка >38.5°C · ↑Прокальцитонин · ТАП-посев (+)</div>'+
      '</div>'+
      (ds.inf?
        '<div style="margin-bottom:13px"><div class="sl">Срок от начала заболевания</div>'+
          '<div class="tg">'+
            '<button class="tb'+(ds.timing==='early'?' on':'')+'" onclick="ST.dr.timing=\'early\';R()">⏱ Ранний (&lt;4 нед) — НАНП</button>'+
            '<button class="tb'+(ds.timing==='late'?' on':'')+'" onclick="ST.dr.timing=\'late\';R()">📅 Поздний (≥4 нед) — WON</button>'+
          '</div>'+
        '</div>'+
        '<div style="margin-bottom:13px"><div class="sl">Локализация некроза</div>'+
          '<div class="tg">'+
            '<button class="tb'+(ds.loc==='perigastric'?' on':'')+'" onclick="ST.dr.loc=\'perigastric\';R()">🎯 Перигастральный / центральный</button>'+
            '<button class="tb'+(ds.loc==='retroperitoneal'?' on':'')+'" onclick="ST.dr.loc=\'retroperitoneal\';R()">🔵 Ретроперитонеальный / хвост</button>'+
          '</div>'+
        '</div>'+
        '<div style="margin-bottom:13px"><div class="sl">Объём некроза'+
          (ctNec?'<span style="font-size:10px;color:var(--c);margin-left:7px">✦ заполнено из МСКТ</span>':'')+'</div>'+
          '<div class="tg">'+
            '<button class="tb'+(ds.nec==='small'?' on':'')+'" onclick="ST.dr.nec=\'small\';R()">&lt;50% ПЖ</button>'+
            '<button class="tb'+(ds.nec==='large'?' onr':'')+'" onclick="ST.dr.nec=\'large\';R()">≥50% ПЖ ⚠</button>'+
          '</div>'+
        '</div>'+
        '<div><div class="sl">Гемодинамика</div>'+
          '<div class="tg">'+
            '<button class="tb'+(ds.stab==='stable'?' ong':'')+'" onclick="ST.dr.stab=\'stable\';R()">✅ Стабильна</button>'+
            '<button class="tb'+(ds.stab==='unstable'?' onr':'')+'" onclick="ST.dr.stab=\'unstable\';R()">🚨 Нестабильна</button>'+
          '</div>'+
        '</div>'
      :'')+
    '</div>'+
  '</div>'+
  (!ds.inf?'<div class="al al-g"><b>✅ Признаков инфицирования нет.</b> Консервативное лечение. Энтеральное питание. Инвазия при стерильном некрозе — только при рефрактерных симптомах после ≥4 недель.</div>':'')+
  steps.map(function(s,i){
    return '<div class="ds" style="border-color:'+(s.urgent?'var(--r)44':'var(--bd)')+';border-left:4px solid '+(s.urgent?'var(--r)':'var(--c)')+';background:'+(s.urgent?'#ef434308':'var(--bg2)')+';animation-delay:'+(i*0.07)+'s">'+
      '<div class="di" style="background:'+(s.urgent?'var(--r)20':'var(--c)15')+';border:1px solid '+(s.urgent?'var(--r)44':'var(--c)33')+'">'+s.ico+'</div>'+
      '<div style="flex:1"><div class="dl" style="color:'+(s.urgent?'var(--r)':'var(--t)')+'">'+s.lbl+(s.urgent?'<span class="ub">СРОЧНО</span>':'')+'</div>'+
      '<div class="dd">'+s.det+'</div></div>'+
    '</div>';
  }).join('')+
  (steps.length?'<div class="ib">📚 IAP/APA 2013 · ESGE 2018 · Step-up approach (van Santvoort NEJM 2010) · WSES 2019</div>':'')+
  nav2('← Назад','Объём вмешательства →')+
  '</div>';
}

function pageSurg(){
  var sg=ST.surg;

  if(!sg.gender&&ST.pat.sex){sg.gender=ST.pat.sex==='m'?'10':'0';}

  var vals=[sg.gender,sg.necrosis,sg.character,sg.wall,sg.crp,sg.failure,sg.volume];
  var filledCount=vals.filter(function(v){return v!=='';}).length;
  var allFilled=filledCount===7;
  var total=vals.reduce(function(a,v){return a+(parseInt(v)||0);},0);

  var res=null;
  if(allFilled){

    else if(total<=35) res={c:'y',lbl:'Эндоскопия и/или 3–4 дренажа',           ico:'🎯',sub:'EUS-дренирование или 3–4 чрескожных дренажа'};
    else if(total<=50) res={c:'y',lbl:'4–5 дренажей / эндоскопия / SEMS',       ico:'🔬',sub:'Расширенное дренирование, рассмотреть металлические стенты'};
    else               res={c:'r',lbl:'VARD / открытый доступ',                 ico:'🏥',sub:'Видеоассистированная или открытая некрэктомия'};
  }
  var resC=res?(res.c==='g'?'var(--g)':res.c==='y'?'var(--y)':'var(--r)'):'var(--bd)';

  // Select-helper: вызывает renderContent() напрямую (минуя проверку фокуса)

      '<div class="surg-lbl">'+lbl+'</div>'+
      (sub?'<div class="surg-sub">'+sub+'</div>':'')+

        '<option value="">— Выберите —</option>'+
        opts.map(function(o){return '<option value="'+o[0]+'"'+(sg[key]===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+
      '</select>'+

  return '<div class="fi-anim">'+
  '<div class="card">'+
    '<div class="ch"><span>🏥</span><span class="ct">Калькулятор объёма хирургического вмешательства при панкреонекрозе</span></div>'+
    '<div class="cb">'+
      '<div class="al al-i">Шкала балльной оценки · заполните все 7 параметров и нажмите «Рассчитать»</div>'+

      surgSel('Пол пациента','Автозаполняется из данных пациента',
        'gender',[['0','Женский (0 б)'],['10','Мужской (10 б)']])+

      surgSel('Объём некроза поджелудочной железы','',
        'necrosis',[['0','Менее 30% (0 б)'],['5','30–50% (5 б)'],['8','Более 50% (8 б)']])+

      surgSel('Характер скоплений жидкости','',
        'character',[['0','Гомогенный (0 б)'],['10','Гетерогенный (10 б)']])+

      surgSel('Наличие отграничения (стенки)','',
        'wall',[
          ['0','Стенка не визуализируется (0 б)'],
          ['5','Тонкая стенка (5 б)'],
          ['10','Оформленная стенка с секвестром (10 б)']
        ])+

      surgSel('СРБ (С-реактивный белок)','мг/л',
        'crp',[
          ['2','Менее 50 мг/л (2 б)'],
          ['8','50–100 мг/л (8 б)'],
          ['10','Более 100 мг/л (10 б)'],
          ['12','Нарастание >20 мг/л (12 б)']
        ])+

      surgSel('Органная недостаточность','Моно- или полиорганная',
        'failure',[['0','Нет (0 б)'],['12','Есть (12 б)']])+

      surgSel('Объём забрюшинного скопления','наибольший размер',
        'volume',[
          ['2','Менее 10 см (2 б)'],
          ['5','10–15 см (5 б)'],
          ['8','Более 15 см (8 б)']
        ])+

      // Прогресс-бар
      '<div style="margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-size:11px;color:var(--t3)">Заполнено: '+filledCount+' / 7</span>'+
        (allFilled?'<span style="font-size:12px;font-weight:700;color:var(--c)">'+total+' баллов</span>':'')+
      '</div>'+
      '<div style="height:5px;background:var(--bd);border-radius:3px;overflow:hidden;margin-bottom:14px">'+
        '<div style="height:100%;width:'+(filledCount/7*100)+'%;background:var(--c);transition:.3s"></div>'+

      // Кнопка Рассчитать — всегда видна когда все заполнено
      (allFilled&&!ST.surgCalcDone?
        '<button onclick="surgCalc()" style="width:100%;padding:14px;background:var(--c);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px">📊 Рассчитать объём вмешательства</button>'
      :'')+

      // Результат
      (allFilled&&(ST.surgCalcDone||res)?
        '<div class="score-big" style="border-color:'+resC+'55;background:'+resC+'12">'+
          '<div class="score-num" style="color:'+resC+'">'+total+'</div>'+

          '<div class="score-rec">'+res.sub+'</div>'+
          '<div style="margin-top:12px;font-size:11px;color:var(--t2);line-height:1.7">'+
            (total<15?
              'Показано минимально инвазивное вмешательство. Чрескожное дренирование под КТ/УЗ-наведением, 1–2 катетера достаточно для эффективной санации.':
             total<=35?
              'Рекомендовано EUS-дренирование (трансгастральный доступ, LAMS-стенты) и/или установка 3–4 чрескожных дренажей с динамическим контролем.':
             total<=50?
              '4–5 дренажей. Рассмотреть металлические саморасправляющиеся стенты (SEMS) или эндоскопическую некрэктомию (DEET). Step-up подход.':
              'VARD (видеоассистированная ретроперитонеальная дебридация) или открытая некрэктомия. Высокий операционный риск. ОРИТ обязателен.')+
          '</div>'+
          '<div style="margin-top:10px;padding-top:10px;border-top:1px solid '+resC+'33;font-size:10px;color:var(--t3);text-align:left">'+
            '<b>Пороги:</b> &lt;15 б — ≤2 дренажа &nbsp;·&nbsp; 15–35 — эндоскопия / 3–4 дренажа &nbsp;·&nbsp; 35–50 — 4–5 дренажей / SEMS &nbsp;·&nbsp; >50 — VARD / открытый'+
          '</div>'+
        '</div>'
      :
        (!allFilled?'<div style="text-align:center;padding:18px;color:var(--t3);font-size:13px">Заполните все 7 параметров для расчёта</div>':'')
      )+
    '</div>'+
  '</div>'+
  '<div class="btnrow">'+
    '<button class="btn btn-s" onclick="back()">← Дренирование</button>'+

}


// ── ИТОГОВЫЙ ОТЧЁТ ─────────────────────────────
function pageReport(){
  var p=ST.pat;
  var sc=calc(ST.tp),d=D(ST.tp),tp=ST.tp;
  var ran=calcRanson(),dzh=calcDzhanelidge(ST.tp);
  var ht=pf(p.height),wt=pf(p.weight);
  var bmi=(ht&&wt)?(wt/((ht/100)*(ht/100))):null;
  var bmiNote=bmi?( bmi<18.5?'Дефицит массы тела':bmi<25?'Норма':bmi<30?'Избыточная масса':bmi<35?'Ожирение I ст.':bmi<40?'Ожирение II ст.':'Ожирение III ст.'):'';
  var shortName=makeShortName(p.initials);
  var abbr=getPatAbbr();
  var sexLabel=p.sex==='m'?'Мужской':p.sex==='f'?'Женский':'Не указан';

  // Этиология — текстовый ярлык
  var etioMap={biliary:'Билиарный (ЖКБ/холедохолитиаз)',aliment:'Алиментарный',hypertg:'Гипертриглицеридемия',
    ercp:'Постпроцедурный (ЭРХПГ)',drug:'Медикаментозный',trauma:'Травматический',
    autoimmune:'Аутоиммунный (IgG4)',idio:'Идиопатический'};
  var etioLbl=etioMap[ST.etio]||'Не указана';

  // Тяжесть — итоговый класс
  var sirsType=d.sirs_type||'none';
  var sev=sc.apache>=8||sc.bisap>=3||sc.sofa>=6||ran.score>=3||dzh.score>=5?'r':
          sc.apache>=5||sc.bisap>=2||sc.sofa>=3||ran.score>=2||dzh.score>=2?'y':'g';
  var sevC=sev==='r'?'var(--r)':sev==='y'?'var(--y)':'var(--g)';
  var sevL=sev==='r'?'ТЯЖЁЛЫЙ ОП':sev==='y'?'СРЕДНЕЙ ТЯЖЕСТИ':'ЛЁГКИЙ ОП';
  var sevIcon=sev==='r'?'🚨':sev==='y'?'⚠️':'✅';

  // Хирургический калькулятор
  var sg=ST.surg;
  var surgVals=[sg.gender,sg.necrosis,sg.character,sg.wall,sg.crp,sg.failure,sg.volume];
  var surgAllFilled=surgVals.every(function(v){return v!=='';});
  var surgTotal=surgVals.reduce(function(a,v){return a+(parseInt(v)||0);},0);
  var surgResLbl=surgAllFilled?(surgTotal<15?'Не более 2 дренажей':surgTotal<=35?'Эндоскопия / 3–4 дренажа':surgTotal<=50?'4–5 дренажей / SEMS':'VARD / открытый доступ'):'Не заполнено';
  var surgResC=surgAllFilled?(surgTotal<15?'var(--g)':surgTotal<=35?'var(--y)':surgTotal<=50?'var(--y)':'var(--r)'):'var(--t3)';

  // Строки шкал
  function row(lbl,val,col,extra){
    return '<tr>'+
      '<td style="padding:7px 10px;font-size:13px;color:var(--t2);border-bottom:1px solid #1a2d4422">'+lbl+'</td>'+
      '<td style="padding:7px 10px;font-family:\'Courier New\';font-weight:700;font-size:15px;color:'+(col||'var(--t)')+';border-bottom:1px solid #1a2d4422">'+val+'</td>'+
      '<td style="padding:7px 10px;font-size:11px;color:var(--t3);border-bottom:1px solid #1a2d4422">'+(extra||'')+'</td>'+
    '</tr>';
  }

  var apC=sc.apache>=20?'var(--r)':sc.apache>=8?'var(--y)':'var(--g)';
  var biC=sc.bisap>=3?'var(--r)':sc.bisap>=2?'var(--y)':'var(--g)';
  var soC=sc.sofa>=7?'var(--r)':sc.sofa>=4?'var(--y)':'var(--g)';
  var mcC=sc.mctsi>=7?'var(--r)':sc.mctsi>=4?'var(--y)':'var(--g)';
  var ranC=ran.score>=5?'var(--r)':ran.score>=3?'var(--y)':'var(--g)';
  var dzhC=dzh.score>=5?'var(--r)':dzh.score>=2?'var(--y)':'var(--g)';

  return '<div class="fi-anim">'+

  // Шапка отчёта
  '<div class="card" style="border-color:'+sevC+'55">'+
    '<div style="background:'+sevC+'18;padding:16px 18px;border-bottom:1px solid '+sevC+'33">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">'+
        '<div>'+
          '<div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Pancrea-Score · Итоговый отчёт</div>'+
          '<div style="font-size:22px;font-weight:800;color:var(--t)">'+(abbr||'—')+
            (p.initials?'<span style="font-size:14px;font-weight:400;color:var(--t2);margin-left:10px">'+shortName+'</span>':'')+
          '</div>'+
          '<div style="font-size:13px;color:var(--t2);margin-top:4px">'+
            (p.age?p.age+' лет':'')+
            (p.sex?' · '+sexLabel:'')+
            (bmi?' · ИМТ '+bmi.toFixed(1)+' кг/м² ('+bmiNote+')':'')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:28px;font-weight:700;color:'+sevC+'">'+sevIcon+' '+sevL+'</div>'+
          '<div style="font-size:11px;color:var(--t3);margin-top:2px">'+new Date().toLocaleDateString('ru-RU')+'</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div style="padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">'+
      '<div><span style="color:var(--t2)">Этиология: </span><b>'+etioLbl+'</b></div>'+
      (ST.onset?'<div><span style="color:var(--t2)">Длительность: </span><b>'+sinceOnset()+'</b></div>':'')+
      (p.height&&p.weight?'<div><span style="color:var(--t2)">Рост / Вес: </span><b>'+p.height+' см / '+p.weight+' кг</b></div>':'')+
      (p.chronicYes?'<div style="grid-column:1/-1"><span style="color:var(--y)">⚠ Сопутствующая патология: </span><b>'+(p.chronicDetails||'Имеется (уточнить)')+'</b></div>':'')+
    '</div>'+
  '</div>'+

  // Таблица шкал
  '<div class="card">'+
    '<div class="ch"><span>📊</span><span class="ct">Шкалы тяжести — '+tp+'</span></div>'+
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+
      '<thead><tr>'+
        '<th style="padding:7px 10px;background:var(--bg3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);text-align:left;border-bottom:1px solid var(--bd)">Шкала</th>'+
        '<th style="padding:7px 10px;background:var(--bg3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);text-align:left;border-bottom:1px solid var(--bd)">Балл</th>'+
        '<th style="padding:7px 10px;background:var(--bg3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);text-align:left;border-bottom:1px solid var(--bd)">Интерпретация</th>'+
      '</tr></thead>'+
      '<tbody>'+
        row('BISAP (0–5)',sc.bisap+' / 5',biC,
          (sc.bisap>=3?'Тяжёлый':sc.bisap>=2?'Средней тяжести':'Лёгкий')+' · лет. '+sc.biMort)+
        row('APACHE II',sc.apache,apC,
          (sc.apache>=20?'Крайне тяжёлый':sc.apache>=12?'Тяжёлый':sc.apache>=8?'Средней тяжести':'Лёгкий')+' · лет. ≈'+sc.apMort)+
        row('SOFA (0–24)',sc.sofa+' / 24',soC,
          (sc.sofa>=7?'Полиорганная нед.':sc.sofa>=4?'Тяжёлая дисф.':sc.sofa>=2?'Умеренная дисф.':'Минимальная')+
          (sc.sofa>=2?' · лет. >10%':''))+
        row('mCTSI (0–10)',sc.mctsi+' / 10',mcC,
          (sc.mctsi>=7?'Тяжёлый ~17%':sc.mctsi>=4?'Средний ~6%':sc.mctsi>=2?'Лёгкий ~3%':'Лёгкий <1%'))+
        row('Ranson (0–11)',ran.score+' / 11',ranC,
          ran.sevLbl+' · лет. '+ran.mort)+
        row('Джанелидзе (0–13)',dzh.score+' / 13',dzhC,dzh.sevLbl)+
        (sirsType!=='none'?row('SIRS',sc.sirs+'/4 · '+(sirsType==='persistent'?'Персистирующий':'Транзиторный'),
          sirsType==='persistent'?'var(--r)':'var(--y)',
          'Лет. '+(sirsType==='persistent'?'25.4%':'8%')+' · doi: 10.1002/bjs.5290'):'')+
        (sc.napp?row('NAPP',parseFloat(sc.napp).toFixed(1)+' г/л',parseFloat(sc.napp)>30?'var(--r)':'var(--g)',parseFloat(sc.napp)>30?'⚠ >30 г/л — тяжёлый риск':'В норме'):'')+
        (d.crp?row('CРБ ('+tp+')',d.crp+' мг/л',sc.crpC,(tp!=='24h'?(d.crp>=150?'≥150 мг/л — тяжёлый':'<150 мг/л'):'Пик ожидается к 48ч')):'')+
      '</tbody>'+
    '</table></div>'+
  '</div>'+

  // Итоговый вердикт
  '<div class="card" style="border-color:'+sevC+'55">'+
    '<div style="padding:14px 18px;background:'+sevC+'12">'+
      '<div style="font-size:15px;font-weight:700;color:'+sevC+';margin-bottom:8px">'+sevIcon+' Заключение: '+sevL+'</div>'+
      '<div style="display:flex;gap:14px;flex-wrap:wrap">'+
        [['BISAP',sc.bisap,'/5'],['APACHE II',sc.apache,''],['SOFA',sc.sofa,'/24'],
         ['mCTSI',sc.mctsi,'/10'],['Ranson',ran.score,'/11'],['Джанел.',dzh.score,'/13']].map(function(x){
          return '<div style="text-align:center;min-width:50px">'+
            '<div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">'+x[0]+'</div>'+
            '<div style="font-size:20px;font-weight:700;font-family:\'Courier New\';color:'+sevC+'">'+x[1]+
              '<span style="font-size:10px;color:var(--t3)">'+x[2]+'</span></div>'+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>'+
  '</div>'+

  // Объём вмешательства (если заполнено)
  (surgAllFilled?
    '<div class="card" style="border-color:'+surgResC+'44">'+
      '<div class="ch"><span>🏥</span><span class="ct">Объём хирургического вмешательства</span></div>'+
      '<div style="padding:14px 18px">'+
        '<div style="font-size:28px;font-weight:700;font-family:\'Courier New\';color:'+surgResC+'">'+surgTotal+'</div>'+
        '<div style="font-size:11px;color:var(--t2);margin-bottom:8px">баллов из 60</div>'+
        '<div style="font-size:16px;font-weight:700;color:'+surgResC+'">'+surgResLbl+'</div>'+
        '<div style="margin-top:8px;font-size:10px;color:var(--t3)">'+
          '&lt;15 — ≤2 дренажа &nbsp;·&nbsp; 15–35 — эндоскопия/3–4 &nbsp;·&nbsp; 35–50 — SEMS/4–5 &nbsp;·&nbsp; >50 — VARD/открытый'+
        '</div>'+
      '</div>'+
    '</div>':'<div class="al al-i">ℹ Для расчёта объёма вмешательства заполните шаг «Объём вмеш.»</div>')+

  // Рекомендации по дренированию (если инфицированный некроз)
  (ST.dr.inf?
    '<div class="card">'+
      '<div class="ch"><span>🩺</span><span class="ct">Дренирование — Step-up подход</span></div>'+
      '<div style="padding:12px 18px;font-size:13px;line-height:1.8">'+
        '<div>Инфицирование: <b style="color:var(--r)">Подтверждено</b></div>'+
        '<div>Срок: <b>'+(ST.dr.timing==='early'?'Ранний <4 нед (НАНП)':'Поздний ≥4 нед (WON)')+'</b></div>'+
        '<div>Локализация: <b>'+(ST.dr.loc==='perigastric'?'Перигастральная':'Ретроперитонеальная')+'</b></div>'+
        '<div>Объём некроза: <b>'+(ST.dr.nec==='large'?'≥50% ⚠':'<50%')+'</b></div>'+
        '<div>Гемодинамика: <b style="color:'+(ST.dr.stab==='unstable'?'var(--r)':'var(--g)')+'">'+(ST.dr.stab==='unstable'?'Нестабильна 🚨':'Стабильна')+'</b></div>'+
      '</div>'+
    '</div>':'')+

  // Кнопки
  '<div class="btnrow">'+
    '<button class="btn btn-s" onclick="back()">← Назад</button>'+
    '<button class="btn btn-p" onclick="window.print()">🖨 Печать / PDF</button>'+
  '</div>'+
  '<div class="btnrow" style="margin-top:0;padding-top:0">'+
    '<button class="btn btn-s" onclick="goHome()">👥 Список пациентов</button>'+
    '<button class="btn btn-s" onclick="startNew()" style="margin-left:8px">+ Новый пациент</button>'+
    '<button class="btn btn-s" onclick="exportLink(null)" style="margin-left:8px">🔗 Поделиться ссылкой</button>'+
    '<button class="btn btn-s" onclick="exportFile(null)" style="margin-left:8px">💾 Сохранить файл</button>'+
  '</div>'+
  '</div>';
}


// ═══════════════════════════════════════════════
// HELPERS ДЛЯ ГЕНЕРАЦИИ ПОЛЕЙ
// ═══════════════════════════════════════════════
function tpTabs(){
  return '<div class="tpt">'+
    '<span style="font-size:11px;color:var(--t3);align-self:center;text-transform:uppercase;letter-spacing:.06em;margin-right:3px">Часы:</span>'+
    ['24h','48h','72h'].map(function(t){
      return '<button class="tpb'+(ST.tp===t?' on':'')+'" onclick="ST.tp=\''+t+'\';R()">'+t+'</button>';
    }).join('')+
  '</div>';
}
function nav2(lb,nb){
  // nb может быть строкой-HTML или текстом
  var nbHtml=nb.indexOf('<button')>=0?nb:'<button class="btn btn-p" onclick="next()">'+nb+'</button>';
  return '<div class="btnrow">'+
    '<button class="btn btn-s" onclick="back()">'+lb+'</button>'+
    nbHtml+
  '</div>';
}

// Поле ввода числа — oninput ТОЛЬКО сохраняет, onblur перерисовывает
function dInp(lbl,tp,key,unit,opts){
  opts=opts||{};
  var val=D(tp)[key]||'';
  var extra=(opts.min?' min="'+opts.min+'"':'')+(opts.max?' max="'+opts.max+'"':'')+(opts.step?' step="'+opts.step+'"':' step="any"');
  return '<div class="fl"><div class="flb">'+lbl+'</div>'+
    '<div class="fw">'+
      '<input class="fi'+(unit?' u':'')+'" type="text" inputmode="decimal" placeholder="—" value="'+val+'" '+extra+
        ' oninput="sD(\''+tp+'\',\''+key+'\',this.value)"'+
        ' onblur="onBlur()"'+
        ' onfocus="this.select()">'+
      (unit?'<span class="fu">'+unit+'</span>':'')+
    '</div></div>';
}

// Поле select для данных
function dSel(lbl,tp,key,opts){
  var val=D(tp)[key]||opts[0][0];
  return '<div class="fl"><div class="flb">'+lbl+'</div>'+
    '<select class="fsel" onchange="sDR(\''+tp+'\',\''+key+'\',this.value)">'+
      opts.map(function(o){return '<option value="'+o[0]+'"'+(val===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+
    '</select></div>';
}

// Поле с unit для диагноза/пациента — сохраняет на input, перерисовывает на blur
function inpUnit(lbl,type,id,val,unit,oninput,onblur,hint){
  return '<div class="fl"><div class="flb">'+lbl+'</div>'+
    '<div class="fw">'+
      '<input class="fi u" type="text" inputmode="decimal" id="'+id+'" placeholder="—" value="'+val+'"'+
        ' oninput="'+oninput+'"'+
        ' onblur="'+onblur+'"'+
        ' onfocus="this.select()">'+
      '<span class="fu">'+unit+'</span>'+
    '</div>'+
    (hint?'<div class="fconv">'+hint+'</div>':'')+
  '</div>';
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
if(!importLink()){
  renderFull(); // Показываем список пациентов
}
</script>
</body>
</html>
